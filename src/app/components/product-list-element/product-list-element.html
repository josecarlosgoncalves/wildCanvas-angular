<section>
  <article class="product-item">
    <h3>{{ titulo() }}</h3>
    <img [src]="imagem()" alt="Imagem do produto" />
    <p>{{ descricao() }}</p>
    <p>Preço: {{ preco() | currency: 'EUR' }}</p>
    <p>{{ quantidade() | stock }}</p>
    <button (click)="openModal()">Ver Detalhes</button>
    <button
      (click)="adicionarAoCarrinho()"
      [disabled]="!existeStock()"
      [class.botao-ativo]="existeStock()"
      [style.font-weight]="existeStock() ? 'bold' : 'normal'"
    >
      Adicionar ao Carrinho
    </button>
  </article>

  @if (showModal()) {
    <div class="modal-overlay" (click)="closeModal()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <button class="modal-close" type="button" aria-label="Fechar" (click)="closeModal()">
          X
        </button>
        <h3>{{ titulo() }}</h3>
        <img [src]="imagem()" alt="Imagem do produto" />
        <p>{{ descricao() }}</p>
        <p>Preço: {{ preco() | currency: 'EUR' }}</p>
        <p>{{ quantidade() | stock }}</p>
        <button
          class="modal-cart-button"
          type="button"
          (click)="adicionarAoCarrinho(); closeModal()"
          [disabled]="!existeStock()"
        >
          Adicionar ao Carrinho
        </button>
      </div>
    </div>
  }
</section>
