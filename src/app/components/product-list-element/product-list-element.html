<section>
  <article class="product-item">
    <img [src]="imagem()" [alt]="'Quadro ' + titulo()" loading="lazy" />
    <button type="button" (click)="openModal()">Ver Detalhes</button>
  </article>

  @if (showModal()) {
    <div class="modal-overlay" (click)="closeModal()">
      <div
        class="modal-content"
        role="dialog"
        aria-modal="true"
        [attr.aria-labelledby]="'modal-title-' + product().id"
        (click)="$event.stopPropagation()"
      >
        <button class="modal-close" type="button" aria-label="Fechar" (click)="closeModal()">
          X
        </button>
        <h3 [id]="'modal-title-' + product().id">{{ titulo() }}</h3>
        <img [src]="imagem()" [alt]="'Quadro ' + titulo()" loading="lazy" />
        <dl class="painting-details">
          <div>
            <dt>Autor</dt>
            <dd>{{ autor() }}</dd>
          </div>
          <div>
            <dt>Data do quadro</dt>
            <dd>{{ dataQuadro() }}</dd>
          </div>
          <div>
            <dt>Preço</dt>
            <dd>{{ preco() | currency: 'EUR' }}</dd>
          </div>
          <div>
            <dt>Estado</dt>
            <dd>{{ disponibilidade() }}</dd>
          </div>
        </dl>
        <p>{{ descricao() }}</p>
        <button
          class="modal-cart-button"
          type="button"
          (click)="adicionarAoCarrinho(); closeModal()"
          [disabled]="!existeStock()"
        >
          Adicionar ao Carrinho
        </button>
      </div>
    </div>
  }
</section>
