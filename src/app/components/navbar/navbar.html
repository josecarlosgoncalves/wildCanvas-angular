<header>
  <div class="brand">
    <img src="/images/logo_angular.png" alt="WildCanvas logo" />
    <h1>WildCanvas App</h1>
  </div>

  <button
    class="menu-toggle"
    type="button"
    aria-label="Abrir menu"
    [attr.aria-expanded]="isMenuOpen()"
    aria-controls="main-menu"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="main-menu" [class.open]="isMenuOpen()">
    <ul>
      <li><a routerLink="/" (click)="closeMenu()">Início</a></li>
      <li><a routerLink="/about" (click)="closeMenu()">Sobre</a></li>
      <li><a routerLink="/gallery" (click)="closeMenu()">Galeria</a></li>
      <li><a routerLink="/cart" (click)="closeMenu()">Carrinho</a></li>
      <li><a routerLink="/admin" (click)="closeMenu()">Admin</a></li>
    </ul>
  </nav>
</header>
